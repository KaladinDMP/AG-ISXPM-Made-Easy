; game_config.ini — Per-game profiles for make_patch.ps1
;
; [DEFAULT] values apply to every game. Add one section per game title
; to store settings that differ between games (skin, music, engine, etc.).
; The section name is the short label shown in the selection menu.
;
; The registry uninstall key is derived automatically as: GAME_NAME_is1
; (standard Inno Setup pattern — no need to set it manually).
;
; Run make_patch.ps1, enter the two release name strings when prompted,
; and the script handles the rest.

; ── Branding & UI (same for every game) ───────────────────────────────────────
[DEFAULT]
COPYRIGHT=ARMGDDN Games ™
CONTACT=t.me/ARMGDDNGames

; Patch engine: 0=XDelta  1=JDiff  2=HDiff
PATCH_ENGINE=1

; CPU cores used while generating / applying the patch
GENERATING_CORES=23
APPLYING_CORES=3

; Paths relative to resources\ inside the repo, or absolute paths
SKIN=styles\vcl\Carbon.vsf
CURSOR_BTN=cursors\button\b7.ani
CURSOR_FRM=cursors\form\f7.ani

; Absolute path to your background music file, or leave empty to disable
MUSIC_FILE=

; Icon filename to look for inside the old game folder
ICON_FILE=icon.ico

; ── Game Profiles ──────────────────────────────────────────────────────────────
; One section per game. Section name = label in the selection menu.
; Override any DEFAULT value here if a specific game needs different settings.
; Minimum needed: just the section header — defaults cover everything else.

[Stalker2]
; All defaults apply — no overrides needed for this game

; ── Add more games below ───────────────────────────────────────────────────────
; [MyOtherGame]
; PATCH_ENGINE=0
; GENERATING_CORES=16
