; game_config.ini — Settings for make_patch.ps1 and make_patch_gui.ps1
;
; Values in [DEFAULT] apply to every game automatically.
; Add a new section (e.g. [SomeGame]) ONLY if a specific game needs
; different settings — otherwise DEFAULT covers everything.
;
; The registry key is always derived automatically: GAME_NAME_is1

[DEFAULT]
COPYRIGHT=ARMGDDN Games ™
CONTACT=t.me/ARMGDDNGames

; Patch engine: 0=XDelta  1=JDiff  2=HDiff
PATCH_ENGINE=1

; CPU cores used while generating / applying the patch
GENERATING_CORES=23
APPLYING_CORES=3

; Paths relative to the repo's resources\ folder, or absolute paths
SKIN=styles\vcl\Carbon.vsf
CURSOR_BTN=cursors\button\b7.ani
CURSOR_FRM=cursors\form\f7.ani

; Absolute path to your background music file (leave empty to disable)
MUSIC_FILE=

; Icon filename looked for inside the old game folder
ICON_FILE=icon.ico

; ── Per-game overrides (optional) ─────────────────────────────────────────────
; Uncomment and fill in only if a game needs different settings from above.
;
; [GameShortName]
; PATCH_ENGINE=0
; GENERATING_CORES=16
